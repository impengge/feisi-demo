<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>黄金价格行情 | 近7日走势</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --gold-primary: #c8a84b;
      --gold-light: #f5d67b;
      --gold-dark: #8b6914;
      --gold-bg: #fdf8ee;
      --dark-bg: #1a1209;
      --card-bg: #fff9ed;
      --text-dark: #2d1f00;
      --text-muted: #7a6030;
      --up-color: #e84040;
      --down-color: #1a9e5c;
      --border-color: #e8d898;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1209 0%, #2d1f00 50%, #1a1209 100%);
      min-height: 100vh;
      color: var(--text-dark);
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 20px 30px;
      color: #fff;
    }
    .header .title-icon {
      font-size: 3.5rem;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 20px var(--gold-light));
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold-light), var(--gold-primary), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .header .subtitle {
      font-size: 0.95rem;
      color: #c8a84b88;
      letter-spacing: 1px;
    }
    .header .update-time {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #c8a84b66;
    }

    /* Price Hero */
    .price-hero {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .hero-card {
      background: linear-gradient(135deg, var(--card-bg), #fff);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(200,168,75,0.12);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hero-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(200,168,75,0.2);
    }
    .hero-card .label {
      font-size: 0.82rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .hero-card .value {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--gold-dark);
      line-height: 1;
    }
    .hero-card .value .unit {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-left: 2px;
    }
    .hero-card .change {
      margin-top: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 20px;
      padding: 3px 10px;
      display: inline-block;
    }
    .change.up   { color: #fff; background: var(--up-color); }
    .change.down { color: #fff; background: var(--down-color); }

    .hero-card.featured {
      background: linear-gradient(135deg, #ffd566, #c8a84b, #e8c060);
      border-color: var(--gold-primary);
    }
    .hero-card.featured .label { color: rgba(0,0,0,0.6); }
    .hero-card.featured .value { color: #2d1f00; font-size: 2.4rem; }
    .hero-card.featured .value .unit { color: rgba(0,0,0,0.5); }

    /* Chart Section */
    .section-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(200,168,75,0.08);
    }
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--gold-dark);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: linear-gradient(var(--gold-light), var(--gold-primary));
      border-radius: 2px;
    }
    .chart-wrapper {
      position: relative;
      height: 320px;
    }

    /* Table */
    .price-table {
      width: 100%;
      border-collapse: collapse;
    }
    .price-table th {
      background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
      color: #fff;
      padding: 12px 16px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .price-table th:first-child { border-radius: 8px 0 0 0; }
    .price-table th:last-child  { border-radius: 0 8px 0 0; }
    .price-table td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.92rem;
      color: var(--text-dark);
    }
    .price-table tr:last-child td { border-bottom: none; }
    .price-table tr:hover td { background: rgba(200,168,75,0.06); }
    .price-table .closed { color: #aaa; font-style: italic; }
    .price-table .today-row td { font-weight: 700; background: rgba(200,168,75,0.08); }
    .tag {
      display: inline-block;
      border-radius: 12px;
      padding: 2px 9px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .tag-up   { color: var(--up-color);   background: #ffe8e8; }
    .tag-down { color: var(--down-color); background: #e2f5ec; }
    .tag-flat { color: #888;              background: #f0f0f0; }
    .tag-closed { color: #aaa;            background: #f5f5f5; }

    /* Market status */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #1a9e5c;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.5; transform:scale(1.3); }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px 0 10px;
      font-size: 0.8rem;
      color: rgba(200,168,75,0.5);
      letter-spacing: 0.5px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      body { padding: 12px; }
      .header h1 { font-size: 1.6rem; }
      .hero-card .value { font-size: 1.5rem; }
      .hero-card.featured .value { font-size: 1.8rem; }
      .chart-wrapper { height: 240px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="title-icon">🪙</div>
    <h1>黄金价格行情</h1>
    <p class="subtitle">上海黄金交易所 · AU9999 · 近7日走势</p>
    <p class="update-time">
      <span class="status-dot"></span>
      更新时间：2026年3月10日 &nbsp;|&nbsp; 数据来源：上海黄金交易所
    </p>
  </div>

  <!-- Hero Stats -->
  <div class="price-hero">
    <div class="hero-card featured">
      <div class="label">今日最新价</div>
      <div class="value">1,147.00<span class="unit"> 元/克</span></div>
      <div class="change up">▲ +12.39 (+1.09%)</div>
    </div>
    <div class="hero-card">
      <div class="label">近7日最高</div>
      <div class="value">1,152.34<span class="unit"> 元/克</span></div>
      <div class="change up">3月4日</div>
    </div>
    <div class="hero-card">
      <div class="label">近7日最低</div>
      <div class="value">1,134.61<span class="unit"> 元/克</span></div>
      <div class="change down">3月9日</div>
    </div>
    <div class="hero-card">
      <div class="label">7日区间振幅</div>
      <div class="value">17.73<span class="unit"> 元</span></div>
      <div class="change flat" style="background:#f5e9c8;color:#8b6914">±1.55%</div>
    </div>
  </div>

  <!-- Chart -->
  <div class="section-card">
    <div class="section-title">价格走势图（元/克）</div>
    <div class="chart-wrapper">
      <canvas id="goldChart"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="section-card">
    <div class="section-title">每日收盘价明细</div>
    <table class="price-table">
      <thead>
        <tr>
          <th>日期</th>
          <th>星期</th>
          <th>收盘价（元/克）</th>
          <th>涨跌额</th>
          <th>涨跌幅</th>
          <th>状态</th>
        </tr>
      </thead>
      <tbody id="priceTableBody"></tbody>
    </table>
  </div>

  <!-- Footer -->
  <div class="footer">
    数据来源：上海黄金交易所 AU9999 现货价格 &nbsp;|&nbsp; 仅供参考，不构成投资建议
  </div>

</div>

<script>
  const priceData = [
    { date: '2026-03-04', weekday: '周三', price: 1152.34, open: true },
    { date: '2026-03-05', weekday: '周四', price: 1139.35, open: true },
    { date: '2026-03-06', weekday: '周五', price: 1136.00, open: true },
    { date: '2026-03-07', weekday: '周六', price: null,    open: false },
    { date: '2026-03-08', weekday: '周日', price: null,    open: false },
    { date: '2026-03-09', weekday: '周一', price: 1134.61, open: true },
    { date: '2026-03-10', weekday: '周二', price: 1147.00, open: true },
  ];

  // ---- Chart ----
  const tradingDays = priceData.filter(d => d.open);
  const labels = tradingDays.map(d => {
    const [, m, day] = d.date.split('-');
    return `${+m}月${+day}日`;
  });
  const prices = tradingDays.map(d => d.price);

  const gradientColors = prices.map((p, i) => {
    if (i === 0) return 'rgba(200,168,75,0.9)';
    return p >= prices[i-1] ? 'rgba(232,64,64,0.85)' : 'rgba(26,158,92,0.85)';
  });

  const ctx = document.getElementById('goldChart').getContext('2d');
  const gradientFill = ctx.createLinearGradient(0, 0, 0, 320);
  gradientFill.addColorStop(0, 'rgba(200,168,75,0.35)');
  gradientFill.addColorStop(1, 'rgba(200,168,75,0.02)');

  new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'AU9999收盘价 (元/克)',
        data: prices,
        borderColor: 'rgba(200,168,75,1)',
        borderWidth: 3,
        backgroundColor: gradientFill,
        fill: true,
        tension: 0.38,
        pointBackgroundColor: gradientColors,
        pointBorderColor: '#fff',
        pointBorderWidth: 2.5,
        pointRadius: 7,
        pointHoverRadius: 10,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(26,18,9,0.92)',
          titleColor: '#f5d67b',
          bodyColor: '#fff',
          padding: 14,
          cornerRadius: 10,
          displayColors: false,
          callbacks: {
            title: (items) => items[0].label,
            label: (item) => `  ¥${item.raw.toFixed(2)} 元/克`,
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(200,168,75,0.1)' },
          ticks: { color: '#7a6030', font: { size: 13 } }
        },
        y: {
          min: Math.min(...prices) - 8,
          max: Math.max(...prices) + 8,
          grid: { color: 'rgba(200,168,75,0.12)' },
          ticks: {
            color: '#7a6030',
            font: { size: 12 },
            callback: v => `¥${v.toFixed(0)}`
          }
        }
      },
      interaction: { mode: 'index', intersect: false }
    }
  });

  // ---- Table ----
  const tbody = document.getElementById('priceTableBody');
  priceData.forEach((row, i) => {
    const tr = document.createElement('tr');
    if (row.date === '2026-03-10') tr.classList.add('today-row');

    let changeHtml = '', pctHtml = '', statusHtml = '';
    if (!row.open) {
      changeHtml = `<span class="closed">休市</span>`;
      pctHtml    = `<span class="closed">—</span>`;
      statusHtml = `<span class="tag tag-closed">休市</span>`;
    } else {
      // Find previous trading day
      let prevPrice = null;
      for (let j = i - 1; j >= 0; j--) {
        if (priceData[j].open) { prevPrice = priceData[j].price; break; }
      }
      if (prevPrice === null) {
        changeHtml = '—';
        pctHtml    = '—';
        statusHtml = `<span class="tag tag-flat">基准</span>`;
      } else {
        const diff = row.price - prevPrice;
        const pct  = (diff / prevPrice * 100).toFixed(2);
        const cls  = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
        const sign = diff > 0 ? '▲ +' : diff < 0 ? '▼ ' : '';
        changeHtml = `<span class="tag tag-${cls}">${sign}${diff.toFixed(2)}</span>`;
        pctHtml    = `<span class="tag tag-${cls}">${diff > 0 ? '+' : ''}${pct}%</span>`;
        statusHtml = diff > 0
          ? `<span class="tag tag-up">上涨</span>`
          : diff < 0
          ? `<span class="tag tag-down">下跌</span>`
          : `<span class="tag tag-flat">平盘</span>`;
      }
    }

    const priceDisplay = row.open
      ? `<strong>¥ ${row.price.toFixed(2)}</strong>`
      : `<span class="closed">—</span>`;

    tr.innerHTML = `
      <td>${row.date.replace(/-/g, '/')} ${row.date === '2026-03-10' ? '<span class="tag" style="background:#fff3cd;color:#8b6914;margin-left:4px">今日</span>' : ''}</td>
      <td>${row.weekday}</td>
      <td>${priceDisplay}</td>
      <td>${changeHtml}</td>
      <td>${pctHtml}</td>
      <td>${statusHtml}</td>
    `;
    tbody.appendChild(tr);
  });
</script>
</body>
</html>
