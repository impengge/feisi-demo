<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黄金行情 · AU9999</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #b8922a;
    --gold-light: #f5e6c0;
    --up: #d0021b;
    --down: #0a7c42;
    --text: #111;
    --muted: #888;
    --border: #e8e8e8;
    --bg: #fafafa;
    --white: #fff;
    --radius: 12px;
  }

  html { font-size: 16px; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ── */
  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -.3px;
    color: var(--text);
  }
  .header .meta {
    font-size: .78rem;
    color: var(--muted);
  }
  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    margin-right: 5px;
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── Stats strip ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .stat {
    background: var(--white);
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat .s-label {
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .3px;
    white-space: nowrap;
  }
  .stat .s-val {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: -.5px;
    line-height: 1;
  }
  .stat .s-sub {
    font-size: .72rem;
    color: var(--muted);
  }
  .stat.today { background: #fffbf0; }
  .stat.today .s-val { color: var(--gold); font-size: 1.3rem; }

  /* ── Chart ── */
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: .78rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-bottom: 16px;
  }
  .chart-wrap { position: relative; height: 200px; }

  /* ── Table ── */
  .price-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .875rem;
  }
  .price-table thead th {
    text-align: left;
    font-size: .72rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 0 10px 10px;
    border-bottom: 1px solid var(--border);
  }
  .price-table thead th:not(:first-child) { text-align: right; }
  .price-table tbody td {
    padding: 11px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .price-table tbody tr:last-child td { border-bottom: none; }
  .price-table tbody td:not(:first-child) { text-align: right; }

  .price-table .td-date { font-weight: 500; }
  .price-table .td-day  { color: var(--muted); font-size: .8rem; }
  .price-table .td-price { font-weight: 700; font-variant-numeric: tabular-nums; }
  .price-table .closed td { color: #bbb; }
  .price-table .today-row .td-date::after {
    content: "今";
    background: var(--gold-light);
    color: var(--gold);
    font-size: .65rem;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 4px;
    margin-left: 5px;
    vertical-align: middle;
  }
  .price-table .today-row .td-price { color: var(--gold); }

  .badge {
    display: inline-block;
    font-size: .75rem;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 20px;
  }
  .badge-up   { color: var(--up);   background: #fff0f1; }
  .badge-down { color: var(--down); background: #f0faf5; }
  .badge-flat { color: var(--muted);background: #f5f5f5; }
  .badge-off  { color: #ccc;        background: #f9f9f9; }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: .74rem;
    color: #bbb;
    line-height: 1.8;
  }

  /* ── Mobile tweaks ── */
  @media (max-width: 480px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .stat.today .s-val { font-size: 1.15rem; }
    .chart-wrap { height: 160px; }
    .price-table { font-size: .82rem; }
    .price-table thead th,
    .price-table tbody td { padding-left: 6px; padding-right: 6px; }
    /* hide "week" col on very small screens */
    .col-week { display: none; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <div class="header">
    <h1>黄金行情</h1>
    <span class="meta"><span class="dot"></span>AU9999 · 近7日</span>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsStrip"></div>

  <!-- Chart -->
  <div class="card">
    <div class="card-title">收盘价走势（元/克）</div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="card-title">每日明细</div>
    <table class="price-table">
      <thead>
        <tr>
          <th>日期</th>
          <th class="col-week">周</th>
          <th>收盘价</th>
          <th>涨跌额</th>
          <th>涨跌幅</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="footer">
    数据来源：上海黄金交易所 &nbsp;·&nbsp; 仅供参考，不构成投资建议<br>
    更新时间：2026年3月10日
  </div>
</div>

<script>
const DATA = [
  { date:'03/04', week:'三', price:1152.34, open:true },
  { date:'03/05', week:'四', price:1139.35, open:true },
  { date:'03/06', week:'五', price:1136.00, open:true },
  { date:'03/07', week:'六', price:null,    open:false },
  { date:'03/08', week:'日', price:null,    open:false },
  { date:'03/09', week:'一', price:1134.61, open:true },
  { date:'03/10', week:'二', price:1147.00, open:true, today:true },
];

const trading = DATA.filter(d => d.open);
const prices  = trading.map(d => d.price);
const today   = DATA[DATA.length - 1];
const hi      = Math.max(...prices);
const lo      = Math.min(...prices);
const hiDay   = trading[prices.indexOf(hi)];
const loDay   = trading[prices.indexOf(lo)];
const prevClose = trading[trading.length - 2].price;
const change  = today.price - prevClose;
const changePct = (change / prevClose * 100).toFixed(2);

/* ── Stats ── */
const statsData = [
  { label:'今日收盘', val:`¥${today.price.toFixed(2)}`, sub: (change>=0?'▲ +':' ▼ ')+Math.abs(change).toFixed(2)+' ('+Math.abs(changePct)+'%)', updown: change>=0?'up':'down', today:true },
  { label:'7日最高',  val:`¥${hi.toFixed(2)}`,          sub:`${hiDay.date} 周${hiDay.week}` },
  { label:'7日最低',  val:`¥${lo.toFixed(2)}`,          sub:`${loDay.date} 周${loDay.week}` },
  { label:'7日振幅',  val:`¥${(hi-lo).toFixed(2)}`,     sub:`±${((hi-lo)/lo*100).toFixed(2)}%` },
];
const strip = document.getElementById('statsStrip');
statsData.forEach(s => {
  const el = document.createElement('div');
  el.className = 'stat' + (s.today ? ' today' : '');
  const color = s.updown === 'up' ? 'var(--up)' : s.updown === 'down' ? 'var(--down)' : '';
  el.innerHTML = `
    <span class="s-label">${s.label}</span>
    <span class="s-val">${s.val}</span>
    <span class="s-sub" style="${color?'color:'+color:''}">${s.sub}</span>`;
  strip.appendChild(el);
});

/* ── Chart ── */
const ctx = document.getElementById('chart').getContext('2d');
const grad = ctx.createLinearGradient(0,0,0,200);
grad.addColorStop(0,'rgba(184,146,42,0.12)');
grad.addColorStop(1,'rgba(184,146,42,0)');

new Chart(ctx, {
  type: 'line',
  data: {
    labels: trading.map(d => d.date),
    datasets: [{
      data: prices,
      borderColor: '#b8922a',
      borderWidth: 2,
      backgroundColor: grad,
      fill: true,
      tension: 0.3,
      pointRadius: 4,
      pointBackgroundColor: prices.map((p,i) =>
        i===0 ? '#b8922a' : p>prices[i-1] ? '#d0021b' : '#0a7c42'),
      pointBorderColor: '#fff',
      pointBorderWidth: 1.5,
      pointHoverRadius: 6,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        backgroundColor: '#111',
        titleColor: '#f5e6c0',
        bodyColor: '#fff',
        padding: 10,
        cornerRadius: 8,
        displayColors: false,
        callbacks: {
          title: i => `${i[0].label}（周${trading[i[0].dataIndex].week}）`,
          label: i => `¥ ${i.raw.toFixed(2)} 元/克`
        }
      }
    },
    scales: {
      x: { grid:{display:false}, ticks:{color:'#aaa',font:{size:11}} },
      y: {
        min: Math.min(...prices)-6,
        max: Math.max(...prices)+6,
        grid:{ color:'#f0f0f0', drawBorder:false },
        ticks:{ color:'#aaa', font:{size:11}, callback: v=>'¥'+v }
      }
    },
    interaction:{ mode:'index', intersect:false }
  }
});

/* ── Table ── */
const tbody = document.getElementById('tableBody');
DATA.forEach((row, i) => {
  const tr = document.createElement('tr');
  if (!row.open) tr.className = 'closed';
  if (row.today) tr.className = 'today-row';

  let prevPrice = null;
  for (let j=i-1; j>=0; j--) { if(DATA[j].open){prevPrice=DATA[j].price; break;} }

  let changeHtml='', pctHtml='';
  if (!row.open) {
    changeHtml = `<span class="badge badge-off">休市</span>`;
    pctHtml = '—';
  } else if (prevPrice===null) {
    changeHtml = '<span class="badge badge-flat">基准</span>';
    pctHtml = '—';
  } else {
    const d = row.price - prevPrice;
    const p = (d/prevPrice*100).toFixed(2);
    const cls = d>0?'up':d<0?'down':'flat';
    const sign = d>0?'▲ +':'▼ ';
    changeHtml = `<span class="badge badge-${cls}">${sign}${Math.abs(d).toFixed(2)}</span>`;
    pctHtml = `<span class="badge badge-${cls}">${d>0?'+':''}${p}%</span>`;
  }

  tr.innerHTML = `
    <td class="td-date">${row.date}</td>
    <td class="td-day col-week">${row.week}</td>
    <td class="td-price">${row.open ? '¥ '+row.price.toFixed(2) : '—'}</td>
    <td>${changeHtml}</td>
    <td>${pctHtml}</td>`;
  tbody.appendChild(tr);
});
</script>
</body>
</html>
